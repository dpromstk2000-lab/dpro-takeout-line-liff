<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#fff8ef">
  <title>DPRO テイクアウト マイページ</title>
  <style>
    :root{--bg:#fff8ef;--card:#fff;--ink:#30251e;--sub:#75675e;--line:#eadfd3;--accent:#e9572d;--accent-dark:#b83d1e;--soft:#fff0e7;--green:#268a57;--green-soft:#eaf8f0;--blue:#2e71bd;--blue-soft:#eaf2fc;--amber:#9b640f;--amber-soft:#fff5df;--red:#c6423b;--red-soft:#fff0ef;--shadow:0 12px 34px rgba(72,48,31,.10);--radius:20px}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;color:var(--ink);background:radial-gradient(circle at top right,#ffe6d6 0,transparent 32%),var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;line-height:1.55}button,input,select,textarea{font:inherit}button{cursor:pointer}button:disabled{cursor:not-allowed;opacity:.52}.app{width:min(900px,100%);margin:0 auto;padding:16px 16px 110px}.hero{position:relative;overflow:hidden;padding:22px;border-radius:26px;color:#fff;background:linear-gradient(135deg,#ef643d,#c83e1d);box-shadow:var(--shadow)}.hero:after{content:"🛍️";position:absolute;right:18px;bottom:-10px;font-size:82px;opacity:.2}.eyebrow{margin:0;font-size:11px;font-weight:900;letter-spacing:.12em}.hero h1{margin:3px 0 4px;font-size:clamp(25px,6vw,36px)}.hero p{margin:0;max-width:600px;font-size:13px}.hero-actions{position:relative;z-index:2;display:flex;gap:8px;flex-wrap:wrap;margin-top:15px}.hero-button{border:1px solid rgba(255,255,255,.38);border-radius:999px;color:#fff;background:rgba(255,255,255,.14);padding:9px 13px;font-size:12px;font-weight:900}.profile{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;align-items:center;margin-top:14px;padding:16px;border:1px solid var(--line);border-radius:var(--radius);background:var(--card);box-shadow:var(--shadow)}.profile-name{font-size:20px;font-weight:950}.profile-sub{color:var(--sub);font-size:12px}.profile-count{text-align:right}.profile-count strong{display:block;font-size:28px}.tabs{display:flex;gap:8px;overflow-x:auto;margin:15px 0 12px;scrollbar-width:none}.tabs::-webkit-scrollbar{display:none}.tab{flex:0 0 auto;border:1px solid var(--line);border-radius:999px;background:#fff;color:var(--sub);padding:9px 15px;font-weight:900}.tab.active{border-color:var(--accent);color:#fff;background:var(--accent)}.section-head{display:flex;align-items:end;justify-content:space-between;gap:12px;margin:4px 2px 10px}.section-head h2{margin:0;font-size:21px}.section-head p{margin:0;color:var(--sub);font-size:12px}.orders{display:grid;gap:12px}.order{border:1px solid var(--line);border-left:7px solid var(--line);border-radius:var(--radius);background:var(--card);padding:16px;box-shadow:0 8px 25px rgba(72,48,31,.07)}.order[data-status="received"],.order[data-status="confirmed"]{border-left-color:var(--blue)}.order[data-status="cooking_wait"],.order[data-status="cooking"]{border-left-color:#d98723}.order[data-status="ready"]{border-left-color:var(--green)}.order[data-status="cancelled"],.order[data-status="no_show"],.order[data-status="picked_up"]{opacity:.76}.order-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.order-number{font-weight:950}.pickup{font-size:18px;font-weight:950}.badge{display:inline-flex;border-radius:999px;padding:6px 9px;font-size:11px;font-weight:950;background:#f1efed}.badge.received,.badge.confirmed{color:#225f9e;background:var(--blue-soft)}.badge.cooking_wait,.badge.cooking{color:#81500b;background:var(--amber-soft)}.badge.ready{color:#196c47;background:var(--green-soft)}.badge.cancelled,.badge.no_show{color:#9e302b;background:var(--red-soft)}.items{display:grid;gap:7px;margin:13px 0}.item{display:flex;justify-content:space-between;gap:12px;padding-bottom:7px;border-bottom:1px dashed var(--line)}.item:last-child{border-bottom:0}.item-name{font-weight:900}.option{color:var(--sub);font-size:11px}.note{margin:8px 0;padding:10px;border-radius:11px;background:var(--amber-soft);color:#755118;font-size:12px}.order-bottom{display:flex;align-items:center;justify-content:space-between;gap:12px;border-top:1px solid var(--line);padding-top:12px}.total{font-size:21px;font-weight:950}.actions{display:flex;gap:7px;flex-wrap:wrap;justify-content:flex-end}.button{border:1px solid var(--line);border-radius:11px;background:#fff;color:var(--ink);padding:9px 11px;font-size:12px;font-weight:900}.button.primary{border-color:var(--accent);color:#fff;background:var(--accent)}.button.danger{border-color:#efc4c1;color:var(--red);background:var(--red-soft)}.empty,.loading{padding:42px 18px;border:1px solid var(--line);border-radius:var(--radius);background:#fff;color:var(--sub);text-align:center;box-shadow:var(--shadow)}.spinner{width:30px;height:30px;margin:0 auto 8px;border:3px solid #f0d7ca;border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.overlay{position:fixed;z-index:80;inset:0;display:none;align-items:flex-end;justify-content:center;padding-top:40px;background:rgba(42,31,25,.53)}.overlay.show{display:flex}.sheet{width:min(900px,100%);max-height:92vh;overflow:auto;border-radius:25px 25px 0 0;background:#fffaf5;padding:18px 18px calc(24px + env(safe-area-inset-bottom));box-shadow:0 -16px 42px rgba(42,31,25,.22)}.handle{width:46px;height:5px;margin:0 auto 13px;border-radius:99px;background:#dccdc3}.sheet-head{display:flex;align-items:center;justify-content:space-between;gap:12px}.sheet-head h2{margin:0}.close{width:40px;height:40px;border:0;border-radius:50%;background:#f0e8e2;font-size:20px}.field{display:grid;gap:7px;margin-top:13px}.field label{font-size:13px;font-weight:900}.input,.select,.textarea{width:100%;border:1px solid var(--line);border-radius:13px;background:#fff;padding:12px 13px;outline:none}.input:focus,.select:focus,.textarea:focus{border-color:var(--accent);box-shadow:0 0 0 4px var(--soft)}.slot-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-top:9px}.slot{min-height:52px;border:1px solid var(--line);border-radius:12px;background:#fff;font-weight:900}.slot small{display:block;color:var(--sub);font-size:10px}.slot.active{border-color:var(--accent);color:#fff;background:var(--accent)}.slot:disabled{background:#f3f0ed;color:#aaa}.summary{display:grid;gap:7px;margin-top:14px;padding:13px;border:1px solid var(--line);border-radius:14px;background:#fff}.summary-row{display:flex;justify-content:space-between;gap:12px}.summary-row.total{padding-top:8px;border-top:1px dashed var(--line);font-size:18px;font-weight:950}.stack{display:grid;gap:9px;margin-top:15px}.primary-button,.secondary-button,.danger-button{width:100%;border-radius:13px;padding:13px 15px;font-weight:950}.primary-button{border:0;color:#fff;background:var(--accent)}.secondary-button{border:1px solid var(--line);background:#fff}.danger-button{border:1px solid #efc4c1;color:var(--red);background:var(--red-soft)}.login{position:fixed;z-index:100;inset:0;display:grid;place-items:center;padding:18px;background:rgba(42,31,25,.57);backdrop-filter:blur(7px)}.login.hidden{display:none}.login-card{width:min(450px,100%);padding:23px;border-radius:22px;background:#fff;box-shadow:0 22px 60px rgba(30,21,17,.3)}.login-card h2{margin:0}.login-card p{color:var(--sub);font-size:13px}.toast{position:fixed;z-index:120;left:50%;bottom:calc(20px + env(safe-area-inset-bottom));transform:translate(-50%,18px);width:min(calc(100% - 30px),650px);padding:13px;border-radius:13px;color:#fff;background:#302721;text-align:center;font-size:13px;font-weight:900;opacity:0;pointer-events:none;transition:.22s}.toast.show{opacity:1;transform:translate(-50%,0)}.toast.error{background:var(--red)}.footer{text-align:center;color:#9c8f87;font-size:10px;padding:18px 0 0}@media(max-width:650px){.app{padding:10px 10px 100px}.profile{grid-template-columns:1fr}.profile-count{text-align:left}.order-top,.order-bottom{align-items:flex-start;flex-direction:column}.actions{justify-content:flex-start}.slot-grid{grid-template-columns:repeat(3,minmax(0,1fr))}}
  </style>
</head>
<body>
  <div id="login" class="login">
    <form id="loginForm" class="login-card">
      <h2>マイページを開く</h2>
      <p>注文番号と、注文時に入力した電話番号を入力してください。</p>
      <div class="field"><label for="loginOrder">注文番号</label><input id="loginOrder" class="input" placeholder="T-20260711-001" autocomplete="off"></div>
      <div class="field"><label for="loginPhone">電話番号</label><input id="loginPhone" class="input" inputmode="tel" placeholder="090-1111-2222" autocomplete="tel"></div>
      <div class="stack"><button id="loginButton" class="primary-button" type="submit">マイページを開く</button></div>
    </form>
  </div>

  <main class="app">
    <header class="hero"><p class="eyebrow">DPRO TAKEOUT LINE</p><h1 id="shopName">テイクアウト マイページ</h1><p>注文内容の確認、受取日時の変更、キャンセル、前回と同じ内容での再注文ができます。</p><div class="hero-actions"><button id="newOrder" class="hero-button" type="button">新しく注文する</button><button id="reload" class="hero-button" type="button">更新</button><button id="logout" class="hero-button" type="button">別の注文で確認</button></div></header>
    <section id="profile" class="profile" hidden></section>
    <nav id="tabs" class="tabs"><button class="tab active" data-view="active">現在の注文 0</button><button class="tab" data-view="history">注文履歴 0</button></nav>
    <div class="section-head"><div><h2 id="sectionTitle">現在の注文</h2><p id="sectionSub">受付中・準備中の注文を表示します</p></div><p id="visibleCount">0件</p></div>
    <section id="orders" class="orders"><div class="loading"><div class="spinner"></div>注文を読み込み中</div></section>
    <footer class="footer">STEP TAKEOUT-6-R2 / TAKEOUT-6-R2-CLOSED-DAY-SUBMIT-GUARD-20260711</footer>
  </main>

  <div id="scheduleOverlay" class="overlay"><div class="sheet"><div class="handle"></div><div class="sheet-head"><h2 id="scheduleTitle">受取日時を選択</h2><button class="close" type="button" data-close="scheduleOverlay">×</button></div><div id="scheduleOrderSummary" class="summary"></div><div class="field"><label for="scheduleDate">新しい受取日</label><select id="scheduleDate" class="select"></select></div><div class="field"><label>受取時間</label><div id="scheduleSlots" class="slot-grid"></div></div><div class="stack"><button id="scheduleSubmit" class="primary-button" type="button">変更する</button><button class="secondary-button" type="button" data-close="scheduleOverlay">戻る</button></div></div></div>
  <div id="cancelOverlay" class="overlay"><div class="sheet"><div class="handle"></div><div class="sheet-head"><h2>注文をキャンセル</h2><button class="close" type="button" data-close="cancelOverlay">×</button></div><div id="cancelSummary" class="summary"></div><div class="field"><label for="cancelReason">キャンセル理由（任意）</label><textarea id="cancelReason" class="textarea" rows="3" maxlength="500" placeholder="例：予定が変更になったため"></textarea></div><div class="stack"><button id="cancelSubmit" class="danger-button" type="button">この注文をキャンセルする</button><button class="secondary-button" type="button" data-close="cancelOverlay">戻る</button></div></div></div>
  <div id="toast" class="toast"></div>

  <script src="./config.js"></script>
  <script>
  (()=>{"use strict";
    const config={VERSION:"TAKEOUT-6-R2-CLOSED-DAY-SUBMIT-GUARD-20260711",SHOP_CODE:"takeout_demo",API_BASE_URL:"https://dpro-takeout-line-api.dpromstk2000.workers.dev",...(window.DPRO_TAKEOUT_CONFIG||{})};
    const state={auth:null,customer:null,orders:[],view:"active",settings:null,selectedOrder:null,scheduleMode:"change",selectedDate:"",selectedTime:"",loading:false};
    const $=id=>document.getElementById(id);const el={login:$("login"),loginForm:$("loginForm"),loginOrder:$("loginOrder"),loginPhone:$("loginPhone"),loginButton:$("loginButton"),shopName:$("shopName"),newOrder:$("newOrder"),reload:$("reload"),logout:$("logout"),profile:$("profile"),tabs:$("tabs"),sectionTitle:$("sectionTitle"),sectionSub:$("sectionSub"),visibleCount:$("visibleCount"),orders:$("orders"),scheduleOverlay:$("scheduleOverlay"),scheduleTitle:$("scheduleTitle"),scheduleOrderSummary:$("scheduleOrderSummary"),scheduleDate:$("scheduleDate"),scheduleSlots:$("scheduleSlots"),scheduleSubmit:$("scheduleSubmit"),cancelOverlay:$("cancelOverlay"),cancelSummary:$("cancelSummary"),cancelReason:$("cancelReason"),cancelSubmit:$("cancelSubmit"),toast:$("toast")};
    const yen=new Intl.NumberFormat("ja-JP");const labels={received:"受付済み",confirmed:"店舗確認済み",cooking_wait:"調理待ち",cooking:"調理中",ready:"受取待ち",picked_up:"受取済み",cancelled:"キャンセル",contact_required:"連絡待ち",no_show:"未受取"};
    function apiUrl(path,params={}){const u=new URL(String(config.API_BASE_URL).replace(/\/+$/,"")+path);Object.entries(params).forEach(([k,v])=>{if(v!==undefined&&v!==null&&v!=="")u.searchParams.set(k,String(v))});return u.toString()}
    async function api(path,options={},params={}){const r=await fetch(apiUrl(path,params),{...options,headers:{"Content-Type":"application/json",...(options.headers||{})}});const d=await r.json().catch(()=>null);if(!r.ok||!d?.ok)throw new Error(d?.message||`通信に失敗しました（${r.status}）`);return d}
    function esc(v){return String(v??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
    function money(v){return `${yen.format(Number(v||0))}円`}function dateLabel(s){const [y,m,d]=s.split("-").map(Number);const x=new Date(Date.UTC(y,m-1,d));return `${y}年${m}月${d}日（${["日","月","火","水","木","金","土"][x.getUTCDay()]}）`}
    function today(){return new Intl.DateTimeFormat("en-CA",{timeZone:"Asia/Tokyo",year:"numeric",month:"2-digit",day:"2-digit"}).format(new Date())}function addDays(s,n){const [y,m,d]=s.split("-").map(Number),x=new Date(Date.UTC(y,m-1,d));x.setUTCDate(x.getUTCDate()+n);return x.toISOString().slice(0,10)}
    function toast(m,t="normal"){el.toast.textContent=m;el.toast.className=`toast show${t==="error"?" error":""}`;clearTimeout(toast.timer);toast.timer=setTimeout(()=>el.toast.className="toast",2700)}function open(x){x.classList.add("show");document.body.style.overflow="hidden"}function close(x){x.classList.remove("show");if(!document.querySelector(".overlay.show"))document.body.style.overflow=""}
    function authBody(order=null){const lineUserId=state.auth?.line_user_id||"";return {line_user_id:lineUserId,order_number:lineUserId?"":(order?.order_number||state.auth?.order_number||""),phone:state.auth?.phone||""}}
    async function loadShop(){const d=await api("/api/shop",{}, {shop_code:config.SHOP_CODE});el.shopName.textContent=`${d.shop.shop_name}｜マイページ`}
    async function loadSettings(){const d=await api("/api/settings",{}, {shop_code:config.SHOP_CODE});state.settings=d.settings}
    async function loadOrders(show=true){if(state.loading)return;state.loading=true;if(show)el.orders.innerHTML='<div class="loading"><div class="spinner"></div>注文を読み込み中</div>';try{const d=await api("/api/member/orders",{method:"POST",body:JSON.stringify({shop_code:config.SHOP_CODE,...authBody()})});state.customer=d.customer;state.orders=d.orders||[];el.login.classList.add("hidden");sessionStorage.setItem("takeout_member_auth",JSON.stringify(state.auth));render()}catch(e){toast(e.message,"error");if(!state.customer){el.login.classList.remove("hidden");sessionStorage.removeItem("takeout_member_auth")}}finally{state.loading=false}}
    function render(){const active=state.orders.filter(o=>!["picked_up","cancelled","no_show"].includes(o.status));const hist=state.orders.filter(o=>["picked_up","cancelled","no_show"].includes(o.status));el.profile.hidden=false;el.profile.innerHTML=`<div><div class="profile-name">${esc(state.customer.customer_name)}様</div><div class="profile-sub">${esc(state.customer.phone||"")}　最終注文：${state.customer.last_order_at?new Date(state.customer.last_order_at).toLocaleDateString("ja-JP"):"-"}</div></div><div class="profile-count"><span class="profile-sub">これまでの注文</span><strong>${state.customer.order_count||state.orders.length}回</strong></div>`;el.tabs.innerHTML=`<button class="tab${state.view==="active"?" active":""}" data-view="active">現在の注文 ${active.length}</button><button class="tab${state.view==="history"?" active":""}" data-view="history">注文履歴 ${hist.length}</button>`;const list=state.view==="active"?active:hist;el.sectionTitle.textContent=state.view==="active"?"現在の注文":"注文履歴";el.sectionSub.textContent=state.view==="active"?"受付中・準備中の注文を表示します":"受取済み・キャンセル・未受取を表示します";el.visibleCount.textContent=`${list.length}件`;el.orders.innerHTML=list.length?list.map(card).join(""):'<div class="empty">表示する注文はありません。</div>'}
    function card(o){const items=(o.items||[]).map(i=>`<div class="item"><div><div class="item-name">${esc(i.product_name)} ×${i.quantity}</div>${i.option_summary?`<div class="option">${esc(i.option_summary)}</div>`:""}</div><strong>${money(i.line_total)}</strong></div>`).join("");const acts=[];if(o.can_change_pickup)acts.push(`<button class="button" data-change="${o.id}">受取日時を変更</button>`);if(o.can_cancel)acts.push(`<button class="button danger" data-cancel="${o.id}">キャンセル</button>`);if(o.can_reorder)acts.push(`<button class="button primary" data-reorder="${o.id}">もう一度注文</button>`);return `<article class="order" data-status="${esc(o.status)}"><div class="order-top"><div><div class="order-number">${esc(o.order_number)}</div><div class="pickup">${dateLabel(o.pickup_date)} ${esc(o.pickup_time)}</div></div><span class="badge ${esc(o.status)}">${esc(o.status_label||labels[o.status]||o.status)}</span></div><div class="items">${items}</div>${o.customer_note?`<div class="note"><strong>ご要望：</strong>${esc(o.customer_note)}</div>`:""}<div class="order-bottom"><span class="total">${money(o.total_amount)}</span><div class="actions">${acts.join("")}</div></div></article>`}
    function findOrder(id){return state.orders.find(o=>o.id===id)}function orderSummary(o){return `<div class="summary-row"><span>注文番号</span><strong>${esc(o.order_number)}</strong></div><div class="summary-row"><span>現在の受取</span><strong>${dateLabel(o.pickup_date)} ${esc(o.pickup_time)}</strong></div>`}
    async function openSchedule(o,mode){state.selectedOrder=o;state.scheduleMode=mode;state.selectedDate=today();state.selectedTime="";el.scheduleTitle.textContent=mode==="change"?"受取日時を変更":"前回と同じ内容で注文";el.scheduleSubmit.textContent=mode==="change"?"この日時へ変更する":"この日時で再注文する";el.scheduleSubmit.disabled=true;el.scheduleOrderSummary.innerHTML=orderSummary(o);const max=Number(state.settings?.max_reservation_days||14);el.scheduleDate.innerHTML=Array.from({length:max+1},(_,n)=>{const d=addDays(today(),n);return `<option value="${d}">${n===0?"今日・":n===1?"明日・":""}${dateLabel(d)}</option>`}).join("");el.scheduleDate.value=state.selectedDate;open(el.scheduleOverlay);await loadSlots()}
    async function loadSlots(){state.selectedTime="";el.scheduleSubmit.disabled=true;el.scheduleSlots.innerHTML='<div class="loading" style="grid-column:1/-1;padding:20px"><div class="spinner"></div>時間枠を確認中</div>';try{const d=await api("/api/time-slots",{}, {shop_code:config.SHOP_CODE,date:state.selectedDate});if(d.is_closed){el.scheduleSlots.innerHTML=`<div class="empty" style="grid-column:1/-1;padding:20px"><strong>${esc(dateLabel(state.selectedDate))}は${esc(d.closed_reason||"定休日")}です。</strong><br><span style="font-size:12px">別の営業日を選択してください。</span></div>`;return}if(!d.slots?.length){el.scheduleSlots.innerHTML='<div class="empty" style="grid-column:1/-1;padding:20px">この日は受取時間が設定されていません。別の日を選択してください。</div>';return}const available=d.slots.filter(s=>s.available);el.scheduleSlots.innerHTML=d.slots.map(s=>`<button class="slot" type="button" data-time="${esc(s.pickup_time)}" ${s.available?"":"disabled"}>${esc(s.pickup_time)}<small>${s.available?(s.remaining<=3?`残り${s.remaining}枠`:"受付中"):esc(s.reason||"受付不可")}</small></button>`).join("");if(!available.length){el.scheduleSlots.insertAdjacentHTML("beforeend",'<div class="empty" style="grid-column:1/-1;padding:14px">受付可能な時間がありません。別の日を選択してください。</div>')}}catch(e){el.scheduleSlots.innerHTML=`<div class="empty" style="grid-column:1/-1;padding:20px">${esc(e.message)}</div>`}}
    async function submitSchedule(){if(!state.selectedOrder||!state.selectedTime){toast("受取時間を選択してください。","error");return}el.scheduleSubmit.disabled=true;el.scheduleSubmit.textContent=state.scheduleMode==="change"?"変更中...":"注文中...";try{if(state.scheduleMode==="change"){const d=await api("/api/member/orders/pickup",{method:"PATCH",body:JSON.stringify({shop_code:config.SHOP_CODE,order_id:state.selectedOrder.id,pickup_date:state.selectedDate,pickup_time:state.selectedTime,...authBody(state.selectedOrder)})});toast(d.message||"受取日時を変更しました。");close(el.scheduleOverlay);await loadOrders(false)}else{const d=await api("/api/orders",{method:"POST",body:JSON.stringify({shop_code:config.SHOP_CODE,customer_name:state.customer.customer_name,phone:state.customer.phone,line_user_id:state.auth?.line_user_id||state.customer.line_user_id||"",pickup_date:state.selectedDate,pickup_time:state.selectedTime,customer_note:"前回と同じ内容で再注文",items:(state.selectedOrder.items||[]).map(i=>({product_id:i.product_id,quantity:i.quantity,option_ids:Array.isArray(i.option_ids)?i.option_ids:[]}))})});toast(`再注文を受け付けました：${d.order_number}`);close(el.scheduleOverlay);await loadOrders(false)}}catch(e){toast(e.message,"error")}finally{el.scheduleSubmit.disabled=!state.selectedTime;el.scheduleSubmit.textContent=state.scheduleMode==="change"?"この日時へ変更する":"この日時で再注文する"}}
    function openCancel(o){state.selectedOrder=o;el.cancelSummary.innerHTML=orderSummary(o);el.cancelReason.value="";open(el.cancelOverlay)}async function cancelOrder(){if(!state.selectedOrder)return;if(!confirm(`${state.selectedOrder.order_number}をキャンセルしますか？`))return;el.cancelSubmit.disabled=true;el.cancelSubmit.textContent="キャンセル中...";try{const d=await api("/api/member/orders/cancel",{method:"PATCH",body:JSON.stringify({shop_code:config.SHOP_CODE,order_id:state.selectedOrder.id,reason:el.cancelReason.value.trim(),...authBody(state.selectedOrder)})});toast(d.message||"注文をキャンセルしました。");close(el.cancelOverlay);await loadOrders(false)}catch(e){toast(e.message,"error")}finally{el.cancelSubmit.disabled=false;el.cancelSubmit.textContent="この注文をキャンセルする"}}
    el.loginForm.addEventListener("submit",async e=>{e.preventDefault();state.auth={line_user_id:"",order_number:el.loginOrder.value.trim().toUpperCase(),phone:el.loginPhone.value.trim()};await loadOrders()});el.tabs.addEventListener("click",e=>{const b=e.target.closest("[data-view]");if(!b)return;state.view=b.dataset.view;render()});el.orders.addEventListener("click",e=>{const c=e.target.closest("[data-change]"),x=e.target.closest("[data-cancel]"),r=e.target.closest("[data-reorder]");if(c)openSchedule(findOrder(c.dataset.change),"change");else if(x)openCancel(findOrder(x.dataset.cancel));else if(r)openSchedule(findOrder(r.dataset.reorder),"reorder")});el.scheduleDate.addEventListener("change",()=>{state.selectedDate=el.scheduleDate.value;state.selectedTime="";loadSlots()});el.scheduleSlots.addEventListener("click",e=>{const b=e.target.closest("[data-time]");if(!b||b.disabled)return;state.selectedTime=b.dataset.time;el.scheduleSubmit.disabled=false;el.scheduleSlots.querySelectorAll(".slot").forEach(x=>x.classList.toggle("active",x===b))});el.scheduleSubmit.addEventListener("click",submitSchedule);el.cancelSubmit.addEventListener("click",cancelOrder);document.addEventListener("click",e=>{const b=e.target.closest("[data-close]");if(b)close($(b.dataset.close))});el.reload.addEventListener("click",()=>loadOrders());el.newOrder.addEventListener("click",()=>{const q=state.auth?.line_user_id?`?line_user_id=${encodeURIComponent(state.auth.line_user_id)}`:"";location.href=`./${q}`});el.logout.addEventListener("click",()=>{sessionStorage.removeItem("takeout_member_auth");state.auth=null;state.customer=null;el.loginOrder.value="";el.loginPhone.value="";el.login.classList.remove("hidden")});
    async function init(){await Promise.all([loadShop().catch(()=>{}),loadSettings().catch(()=>{})]);const line=new URLSearchParams(location.search).get("line_user_id")||"";if(line)state.auth={line_user_id:line,order_number:"",phone:""};else{try{state.auth=JSON.parse(sessionStorage.getItem("takeout_member_auth")||"null")}catch{}}if(state.auth)await loadOrders();else{el.login.classList.remove("hidden");el.loginOrder.focus()}}
    init();
  })();
  </script>
</body>
</html>
