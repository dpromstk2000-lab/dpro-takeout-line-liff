      - name: Patch existing owner screens
        shell: bash
        run: |
          set -euo pipefail
          python _step_takeout_16_patch.py
          rm _step_takeout_16_patch.py

      - name: Validate files
        shell: bash
        run: |
          set -euo pipefail

          for file in owner.html owner-reception.html owner-products.html config.js takeout-owner-next.css takeout-owner-next.js; do
            test -s "$file"
          done

          grep -Fq "TAKEOUT-16-OWNER-UNIFIED-20260721" config.js
          grep -Fq "takeout-owner-next.css" owner.html
          grep -Fq "takeout-owner-next.js" owner.html
          grep -Fq "takeout-owner-next.css" owner-reception.html
          grep -Fq "takeout-owner-next.js" owner-reception.html
          grep -Fq "takeout-owner-next.css" owner-products.html
          grep -Fq "takeout-owner-next.js" owner-products.html

          grep -Fq "/api/admin/orders" owner.html
          grep -Fq "/api/admin/orders/status" owner.html
          grep -Fq "/api/admin/manual-orders" owner-reception.html
          grep -Fq "/api/admin/customers" owner-reception.html
          grep -Fq "/api/admin/products/options" owner-products.html
          grep -Fq "/api/admin/products/image" owner-products.html

          grep -Fq 'params.get("preview")' owner.html
          grep -Fq 'params.get("preview")' owner-reception.html
          grep -Fq 'params.get("preview")' owner-products.html

          node --check takeout-owner-next.js

          python3 - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          import sys

          class Inspector(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.ids = []
              def handle_starttag(self, tag, attrs):
                  for key, value in attrs:
                      if key == "id" and value:
                          self.ids.append(value)

          for filename in ["owner.html", "owner-reception.html", "owner-products.html"]:
              html = Path(filename).read_text(encoding="utf-8")
              parser = Inspector()
              parser.feed(html)
              duplicates = sorted(set(
                  value for value in parser.ids
                  if parser.ids.count(value) > 1
              ))
              if duplicates:
                  print(filename, "Duplicate IDs:", duplicates)
                  sys.exit(1)
              if not html.lstrip().lower().startswith("<!doctype html>"):
                  print(filename, "DOCTYPE missing")
                  sys.exit(1)
              if not html.rstrip().lower().endswith("</html>"):
                  print(filename, "HTML closing tag missing")
                  sys.exit(1)

          print("STEP TAKEOUT-16 validation: OK")
          PY

      - name: Commit and push
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- owner.html owner-reception.html owner-products.html config.js takeout-owner-next.css takeout-owner-next.js; then
            echo "Already up to date."
            exit 0
          fi

          git config user.name "DPRO GitHub Actions"
          git config user.email "actions@users.noreply.github.com"
          git add owner.html owner-reception.html owner-products.html config.js takeout-owner-next.css takeout-owner-next.js
          git commit -m "STEP TAKEOUT-16: unify owner screens"
          git push origin HEAD:main

      - name: Deployment summary
        shell: bash
        run: |
          {
            echo "## STEP TAKEOUT-16 Complete"
            echo "- PC order management unified"
            echo "- Phone and counter reception unified"
            echo "- Product management unified"
            echo "- Shared navigation and styling added"
            echo "- Worker change: none"
            echo "- Supabase change: none"
          } >> "$GITHUB_STEP_SUMMARY"
