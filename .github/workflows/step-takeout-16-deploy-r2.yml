name: STEP TAKEOUT-16 Deploy R2

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/step-takeout-16-deploy-r2.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: step-takeout-16-deploy-r2
  cancel-in-progress: false

jobs:
  deploy:
    name: Unify owner screens
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

