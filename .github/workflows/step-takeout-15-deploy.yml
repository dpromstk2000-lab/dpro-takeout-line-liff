      - name: Validate files
        shell: bash
        run: |
          set -euo pipefail

          test -s owner-ipad.html
          test -s config.js

          grep -Fq "TAKEOUT-15-KITCHEN-BOARD-20260721" owner-ipad.html
          grep -Fq "TAKEOUT-15-KITCHEN-BOARD-20260721" config.js
          grep -Fq "/api/admin/orders" owner-ipad.html
          grep -Fq "/api/admin/orders/status" owner-ipad.html
          grep -Fq "cooking_wait" owner-ipad.html
          grep -Fq "total_cooking_points" owner-ipad.html
          grep -Fq 'params.get("preview")' owner-ipad.html
          grep -Fq "window.DPRO_TAKEOUT_CONFIG" config.js

          python3 - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          import re
          import subprocess
          import sys
          import tempfile

          html = Path("owner-ipad.html").read_text(encoding="utf-8")

          class Inspector(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.ids = []
              def handle_starttag(self, tag, attrs):
                  for key, value in attrs:
                      if key == "id" and value:
                          self.ids.append(value)

          parser = Inspector()
          parser.feed(html)

          duplicates = sorted(set(
              value for value in parser.ids
              if parser.ids.count(value) > 1
          ))
          if duplicates:
              print("Duplicate IDs:", duplicates)
              sys.exit(1)

          if not html.lstrip().lower().startswith("<!doctype html>"):
              print("DOCTYPE missing")
              sys.exit(1)

          if not html.rstrip().lower().endswith("</html>"):
              print("HTML closing tag missing")
              sys.exit(1)

          scripts = re.findall(
              r"<script(?![^>]*\bsrc=)[^>]*>(.*?)</script>",
              html,
              flags=re.S | re.I,
          )
          with tempfile.NamedTemporaryFile(
              mode="w", suffix=".js", encoding="utf-8", delete=False
          ) as temp:
              temp.write("\n".join(scripts))
              temp_path = temp.name

          result = subprocess.run(
              ["node", "--check", temp_path],
              capture_output=True,
              text=True,
          )
          if result.returncode != 0:
              print(result.stderr)
              sys.exit(result.returncode)

          print("HTML and JavaScript validation: OK")
          PY

      - name: Commit and push
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- owner-ipad.html config.js; then
            echo "Already up to date."
            exit 0
          fi

          git config user.name "DPRO GitHub Actions"
          git config user.email "actions@users.noreply.github.com"
          git add owner-ipad.html config.js
          git commit -m "STEP TAKEOUT-15: kitchen board UI"
          git push origin HEAD:main

      - name: Deployment summary
        shell: bash
        run: |
          {
            echo "## STEP TAKEOUT-15 Complete"
            echo ""
            echo "- owner-ipad.html updated"
            echo "- config.js updated"
            echo "- Worker change: none"
            echo "- Supabase change: none"
            echo "- Preview: https://dpromstk2000-lab.github.io/dpro-takeout-line-liff/owner-ipad.html?preview=1&v=takeout-15"
          } >> "$GITHUB_STEP_SUMMARY"
