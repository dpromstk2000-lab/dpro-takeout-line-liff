name: STEP TAKEOUT-15 Deploy

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/step-takeout-15-deploy.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: step-takeout-15-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy kitchen board UI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Confirm repository
        shell: bash
        run: |
          set -euo pipefail
          test "$GITHUB_REPOSITORY" = "dpromstk2000-lab/dpro-takeout-line-liff"

