      - name: Validate files
        shell: bash
        run: |
          set -euo pipefail
          test -s system-check.html
          test -s config.js
          grep -Fq "TAKEOUT-18-FINAL-SYSTEM-CHECK-20260722" system-check.html
          grep -Fq "TAKEOUT-18-FINAL-SYSTEM-CHECK-20260722" config.js
          grep -Fq "/api/admin/system-check" system-check.html
          grep -Fq "/api/admin/demo-status" system-check.html
          grep -Fq "/api/admin/demo-prepare" system-check.html
          grep -Fq "/api/admin/demo-reset" system-check.html
          grep -Fq "TAKEOUT-14-BAKERY-CATALOG-20260721" system-check.html
          grep -Fq "TAKEOUT-15-KITCHEN-BOARD-20260721" system-check.html
          grep -Fq "TAKEOUT-16-OWNER-UNIFIED-20260721" system-check.html
          grep -Fq "TAKEOUT-17-MEMBER-REORDER-STATUS-20260721" system-check.html
          grep -Fq "TAKEOUT-9-R3-USER-SCROLL-ACTIVE-FIX-20260711" system-check.html
          grep -Fq 'params.get("preview")' system-check.html
          grep -Fq "window.DPRO_TAKEOUT_CONFIG" config.js
          python3 - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          import re,subprocess,sys,tempfile
          html=Path("system-check.html").read_text(encoding="utf-8")
          class Inspector(HTMLParser):
              def __init__(self): super().__init__(); self.ids=[]
              def handle_starttag(self,tag,attrs):
                  for k,v in attrs:
                      if k=="id" and v:self.ids.append(v)
          p=Inspector();p.feed(html)
          d=sorted(set(x for x in p.ids if p.ids.count(x)>1))
          if d: print("Duplicate IDs:",d);sys.exit(1)
          if not html.lstrip().lower().startswith("<!doctype html>") or not html.rstrip().lower().endswith("</html>"):
              print("HTML structure error");sys.exit(1)
          if html.count('file:"')!=8: print("Eight page definitions missing");sys.exit(1)
          scripts=re.findall(r"<script(?![^>]*\bsrc=)[^>]*>(.*?)</script>",html,flags=re.S|re.I)
          with tempfile.NamedTemporaryFile(mode="w",suffix=".js",encoding="utf-8",delete=False) as f:
              f.write("\n".join(scripts));path=f.name
          r=subprocess.run(["node","--check",path],capture_output=True,text=True)
          if r.returncode: print(r.stderr);sys.exit(r.returncode)
          print("STEP TAKEOUT-18 validation: OK")
          PY

      - name: Commit and push
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- system-check.html config.js; then
            echo "Already up to date."
            exit 0
          fi
          git config user.name "DPRO GitHub Actions"
          git config user.email "actions@users.noreply.github.com"
          git add system-check.html config.js
          git commit -m "STEP TAKEOUT-18: final system check"
          git push origin HEAD:main

      - name: Deployment summary
        shell: bash
        run: |
          {
            echo "## STEP TAKEOUT-18 Complete"
            echo "- system-check.html updated"
            echo "- config.js updated"
            echo "- API checks: 8"
            echo "- Public page checks: 8"
            echo "- Manual checks: 10"
            echo "- Worker change: none"
            echo "- Supabase change: none"
          } >> "$GITHUB_STEP_SUMMARY"
