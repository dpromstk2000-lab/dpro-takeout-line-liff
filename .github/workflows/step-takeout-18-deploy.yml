name: STEP TAKEOUT-18 Deploy

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/step-takeout-18-deploy.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: step-takeout-18-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy final system check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

