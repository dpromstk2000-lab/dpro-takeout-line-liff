      - name: Validate files
        shell: bash
        run: |
          set -euo pipefail
          test -s index.html
          test -s config.js
          grep -Fq "TAKEOUT-14-BAKERY-CATALOG-20260721" index.html
          grep -Fq "TAKEOUT-14-BAKERY-CATALOG-20260721" config.js
          grep -Fq "/api/products" index.html
          grep -Fq "/api/time-slots" index.html
          grep -Fq "/api/orders" index.html
          grep -Fq "preview=1" index.html
          grep -Fq "window.DPRO_TAKEOUT_CONFIG" config.js

          python3 - <<'PY2'
          from html.parser import HTMLParser
          from pathlib import Path
          import sys

          html = Path("index.html").read_text(encoding="utf-8")

          class Inspector(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.ids = []

              def handle_starttag(self, tag, attrs):
                  for key, value in attrs:
                      if key == "id" and value:
                          self.ids.append(value)

          parser = Inspector()
          parser.feed(html)
          duplicates = sorted(set(value for value in parser.ids if parser.ids.count(value) > 1))

          if duplicates:
              print("重複ID:", duplicates)
              sys.exit(1)
          if not html.lstrip().lower().startswith("<!doctype html>"):
              print("DOCTYPEがありません")
              sys.exit(1)
          if not html.rstrip().lower().endswith("</html>"):
              print("HTML終端が不正です")
              sys.exit(1)

          print("HTML検査: OK")
          PY2

