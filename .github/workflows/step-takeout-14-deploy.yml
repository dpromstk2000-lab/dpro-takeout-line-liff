name: STEP TAKEOUT-14 Deploy

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/step-takeout-14-deploy.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: step-takeout-14-deploy
  cancel-in-progress: false

