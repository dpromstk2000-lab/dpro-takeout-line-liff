      - name: Validate files
        shell: bash
        run: |
          set -euo pipefail

          test -s index.html
          test -s config.js

          grep -Fq "TAKEOUT-14-BAKERY-CATALOG-20260721" index.html
          grep -Fq "TAKEOUT-14-BAKERY-CATALOG-20260721" config.js
          grep -Fq "/api/products" index.html
          grep -Fq "/api/time-slots" index.html
          grep -Fq "/api/orders" index.html
          grep -Fq 'params.get("preview")' index.html
          grep -Fq "window.DPRO_TAKEOUT_CONFIG" config.js

          python3 - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          import sys

          html = Path("index.html").read_text(encoding="utf-8")

          class Inspector(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.ids = []

              def handle_starttag(self, tag, attrs):
                  for key, value in attrs:
                      if key == "id" and value:
                          self.ids.append(value)

          parser = Inspector()
          parser.feed(html)

          duplicates = sorted(set(
              value for value in parser.ids
              if parser.ids.count(value) > 1
          ))

          if duplicates:
              print("Duplicate IDs:", duplicates)
              sys.exit(1)

          if not html.lstrip().lower().startswith("<!doctype html>"):
              print("DOCTYPE missing")
              sys.exit(1)

          if not html.rstrip().lower().endswith("</html>"):
              print("HTML closing tag missing")
              sys.exit(1)

          print("HTML validation: OK")
          PY

      - name: Commit and push
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- index.html config.js; then
            echo "Already up to date."
            exit 0
          fi

          git config user.name "DPRO GitHub Actions"
          git config user.email "actions@users.noreply.github.com"
          git add index.html config.js
          git commit -m "STEP TAKEOUT-14: refresh customer catalog UI"
          git push origin HEAD:main

      - name: Deployment summary
        shell: bash
        run: |
          {
            echo "## STEP TAKEOUT-14 Complete"
            echo ""
            echo "- index.html updated"
            echo "- config.js updated"
            echo "- Worker change: none"
            echo "- Supabase change: none"
            echo "- Preview: https://dpromstk2000-lab.github.io/dpro-takeout-line-liff/?preview=1&v=takeout-14-r3"
          } >> "$GITHUB_STEP_SUMMARY"
