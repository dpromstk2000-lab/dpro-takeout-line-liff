      - name: Validate files
        shell: bash
        run: |
          set -euo pipefail

          test -s member.html
          test -s config.js

          grep -Fq "TAKEOUT-17-MEMBER-REORDER-STATUS-20260721" member.html
          grep -Fq "TAKEOUT-17-MEMBER-REORDER-STATUS-20260721" config.js
          grep -Fq "/api/member/orders" member.html
          grep -Fq "/api/member/orders/pickup" member.html
          grep -Fq "/api/member/orders/cancel" member.html
          grep -Fq "/api/time-slots" member.html
          grep -Fq "/api/orders" member.html
          grep -Fq 'params.get("preview")' member.html
          grep -Fq "can_reorder" member.html
          grep -Fq "line_user_id" member.html
          grep -Fq "window.DPRO_TAKEOUT_CONFIG" config.js

          python3 - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          import re
          import subprocess
          import sys
          import tempfile

          html = Path("member.html").read_text(encoding="utf-8")

          class Inspector(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.ids = []
              def handle_starttag(self, tag, attrs):
                  for key, value in attrs:
                      if key == "id" and value:
                          self.ids.append(value)

          parser = Inspector()
          parser.feed(html)
          duplicates = sorted(set(
              value for value in parser.ids
              if parser.ids.count(value) > 1
          ))

          if duplicates:
              print("Duplicate IDs:", duplicates)
              sys.exit(1)

          if not html.lstrip().lower().startswith("<!doctype html>"):
              print("DOCTYPE missing")
              sys.exit(1)

          if not html.rstrip().lower().endswith("</html>"):
              print("HTML closing tag missing")
              sys.exit(1)

          scripts = re.findall(
              r"<script(?![^>]*\bsrc=)[^>]*>(.*?)</script>",
              html,
              flags=re.S | re.I,
          )
          with tempfile.NamedTemporaryFile(
              mode="w",
              suffix=".js",
              encoding="utf-8",
              delete=False,
          ) as temp:
              temp.write("\n".join(scripts))
              temp_path = temp.name

          result = subprocess.run(
              ["node", "--check", temp_path],
              capture_output=True,
              text=True,
          )
          if result.returncode != 0:
              print(result.stderr)
              sys.exit(result.returncode)

          print("HTML and JavaScript validation: OK")
          PY

      - name: Commit and push
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- member.html config.js; then
            echo "Already up to date."
            exit 0
          fi

          git config user.name "DPRO GitHub Actions"
          git config user.email "actions@users.noreply.github.com"
          git add member.html config.js
          git commit -m "STEP TAKEOUT-17: member reorder and status UI"
          git push origin HEAD:main

