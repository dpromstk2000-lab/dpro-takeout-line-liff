name: STEP TAKEOUT-14 Auto Trigger

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/step-takeout-14-auto-trigger.yml
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch STEP TAKEOUT-14 Deploy
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh workflow run step-takeout-14-deploy.yml --repo "$GITHUB_REPOSITORY" --ref main
          echo "STEP TAKEOUT-14 Deploy was dispatched."
